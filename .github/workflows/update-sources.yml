name: Update sources

on:
  workflow_dispatch:
  schedule:
    - cron: "17 2 * * 1"

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    name: Update nixpkgs and nvfetcher sources
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v17

      - name: Update nixpkgs
        run: nix flake update nixpkgs

      - name: Update nvfetcher sources
        run: nix run nixpkgs#nvfetcher -- -c nvfetcher.toml -o _sources

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore: update nix sources"
          title: "chore: update nix sources"
          body: |
            Automated update for nixpkgs and nvfetcher generated sources.
          branch: update/nix-sources
          delete-branch: true
